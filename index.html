<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lower Limb Growth Predictor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦵</text></svg>">
    <style>
        :root { --primary-color: #1a73e8; --bg-color: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 10px; color: #333; overflow-x: hidden; }
        .container { max-width: 950px; margin: auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .disclaimer { background-color: #fff8e1; color: #795548; padding: 8px 12px; border-radius: 8px; border-left: 5px solid #ffc107; font-size: 0.8em; margin-bottom: 15px; }
        h2 { text-align: center; color: var(--primary-color); margin: 0 0 15px 0; font-size: 1.4em; }
        
        .main-layout { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 20px; align-items: start; }
        @media (max-width: 850px) { .main-layout { grid-template-columns: 1fr; } }

        .section-box { background: #f1f3f4; padding: 12px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #e0e0e0; }
        .section-title { font-size: 0.85em; color: var(--primary-color); margin-bottom: 8px; font-weight: bold; border-bottom: 1px solid #d1d3d4; padding-bottom: 4px; }
        
        .input-group { margin-bottom: 8px; }
        label { display: block; font-weight: 700; margin-bottom: 4px; font-size: 0.82em; color: #555; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 0.95em; }
        input[readonly] { background-color: #e9ecef; color: #6c757d; cursor: not-allowed; border: 1px dashed #ccc; }
        
        .gender-wrap { display: flex; gap: 15px; padding: 2px 0; }
        .gender-wrap label { display: inline-flex; align-items: center; cursor: pointer; font-weight: 500; font-size: 0.85em; }
        .gender-wrap input[type="radio"] { width: auto; margin-right: 6px; }
        
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .controls-row { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        button { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9em; font-weight: bold; transition: 0.2s; }
        .btn-calc { background-color: var(--primary-color); color: white; flex: 2; }
        .btn-reset { background-color: #dadce0; color: #3c4043; flex: 1; }
        .auto-calc-wrap { display: flex; align-items: center; gap: 4px; white-space: nowrap; font-size: 0.75em; color: #666; cursor: pointer; }
        .auto-calc-wrap input { width: auto; margin: 0; }

        .result-card { background: #e8f0fe; padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; height: 100%; min-height: 480px; }
        .result-header { border-bottom: 2px solid #aecbfa; padding-bottom: 6px; font-weight: bold; color: #174ea6; font-size: 0.95em; display: flex; align-items: center; gap: 5px; }
        .res-row { display: flex; justify-content: space-between; font-size: 0.85em; margin-bottom: 2px; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; font-size: 0.8em; margin-top: 5px; }
        th, td { padding: 8px 4px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #f8f9fa; color: #666; font-weight: bold; }
        .loss { color: #d93025; font-weight: bold; }
        .total-row { background: #f1f3f4; font-weight: bold; }

        .card-footer { margin-top: auto; padding-top: 10px; border-top: 1px solid #aecbfa; }
        .paper-link { font-size: 0.72em; color: #666; font-style: italic; margin-bottom: 8px; line-height: 1.3; }
        .lang-selector { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; border-top: 1px dashed #aecbfa; padding-top: 8px; }
        .lang-selector label { margin: 0; font-size: 0.72em; display: flex; align-items: center; gap: 3px; cursor: pointer; color: #444; font-weight: 500; }
        .lang-selector input { width: auto; margin: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="disclaimer" id="txt-disclaimer"></div>
    <h2 id="txt-title">Lower Limb Growth Predictor</h2>

    <div class="main-layout">
        <!-- Input Section -->
        <div class="input-section">
            <div class="row-2">
                <div class="input-group">
                    <label id="txt-label-gender">Gender</label>
                    <div class="gender-wrap">
                        <label><input type="radio" name="gender" value="male" onchange="setDefaultValues()"> <span id="txt-male">Male</span></label>
                        <label><input type="radio" name="gender" value="female" checked onchange="setDefaultValues()"> <span id="txt-female">Female</span></label>
                    </div>
                </div>
                <div class="input-group">
                    <label id="txt-label-currentAge">Current Age</label>
                    <input type="number" id="currentAge" value="10" step="0.1" oninput="handleInputChange()">
                </div>
            </div>

            <div class="section-box">
                <div class="section-title" id="txt-sec-femur">Femur (Thigh)</div>
                <div class="row-2">
                    <div class="input-group"><label id="txt-label-fStop">Stop Age</label><input type="number" id="fStopAge" step="0.1" oninput="handleInputChange()"></div>
                    <div class="input-group"><label id="txt-label-fRate">Rate (cm/yr)</label><input type="number" id="fRate" step="0.01" oninput="handleInputChange()"></div>
                </div>
                <div class="row-2">
                    <div class="input-group"><label id="txt-fu">Prox. Femur (%)</label><input type="number" id="fuRatio" value="30" oninput="syncRatios('f')"></div>
                    <div class="input-group"><label id="txt-fl">Dist. Femur (%) (Auto)</label><input type="number" id="flRatio" value="70" readonly></div>
                </div>
            </div>

            <div class="section-box">
                <div class="section-title" id="txt-sec-tibia">Tibia (Shin)</div>
                <div class="row-2">
                    <div class="input-group"><label id="txt-label-tStop">Stop Age</label><input type="number" id="tStopAge" step="0.1" oninput="handleInputChange()"></div>
                    <div class="input-group"><label id="txt-label-tRate">Rate (cm/yr)</label><input type="number" id="tRate" step="0.01" oninput="handleInputChange()"></div>
                </div>
                <div class="row-2">
                    <div class="input-group"><label id="txt-tu">Prox. Tibia (%)</label><input type="number" id="tuRatio" value="55" oninput="syncRatios('t')"></div>
                    <div class="input-group"><label id="txt-tl">Dist. Tibia (%) (Auto)</label><input type="number" id="tlRatio" value="45" readonly></div>
                </div>
            </div>

            <div class="controls-row">
                <button class="btn-reset" onclick="resetAll()" id="txt-btn-reset">Reset</button>
                <button class="btn-calc" onclick="calculate()" id="txt-btn-calc">Calculate</button>
                <label class="auto-calc-wrap">
                    <input type="checkbox" id="autoCalcEnabled" checked> <span id="txt-auto-calc">Real-time</span>
                </label>
            </div>
        </div>

        <!-- Result Section -->
        <div class="result-section">
            <div class="result-card">
                <div class="result-header" id="txt-res-header"><span>📊</span> <span id="txt-res-header-text">Growth Analysis</span></div>
                <div class="res-row">
                    <span id="txt-res-years-label">Remaining (F/T):</span>
                    <b><span id="resYearsF">-</span> / <span id="resYearsT">-</span> <span id="txt-unit-years">Yrs</span></b>
                </div>
                <div class="res-row">
                    <span id="txt-res-total-label">Potential Growth:</span>
                    <b style="color:var(--primary-color); font-size:1.1em;"><span id="resTotal">-</span> cm</b>
                </div>

                <div style="font-size:0.8em; font-weight:bold; color:#d93025; margin-top:5px;" id="txt-res-sub">⚠️ Growth Loss Simulation</div>
                <table>
                    <thead>
                        <tr><th id="txt-th-point">Segment</th><th id="txt-th-potential">Ratio</th><th id="txt-th-loss">Loss</th></tr>
                    </thead>
                    <tbody id="resTable"></tbody>
                    <tfoot>
                        <tr class="total-row"><td colspan="2" id="txt-total-loss-label">Total Loss</td><td class="loss" id="resTotalLoss">-</td></tr>
                    </tfoot>
                </table>

                <div class="card-footer">
                    <div class="paper-link" id="txt-paper-info"></div>
                    <div class="lang-selector">
                        <label><input type="radio" name="lang" value="en" onclick="changeLanguage('en')"> EN</label>
                        <label><input type="radio" name="lang" value="fr" onclick="changeLanguage('fr')"> FR</label>
                        <label><input type="radio" name="lang" value="it" onclick="changeLanguage('it')"> IT</label>
                        <label><input type="radio" name="lang" value="de" onclick="changeLanguage('de')"> DE</label>
                        <label><input type="radio" name="lang" value="es" onclick="changeLanguage('es')"> ES</label>
                        <label><input type="radio" name="lang" value="zh" onclick="changeLanguage('zh')"> 中</label>
                        <label><input type="radio" name="lang" value="ja" onclick="changeLanguage('ja')"> 日</label>
                        <label><input type="radio" name="lang" value="ko" onclick="changeLanguage('ko')"> 한</label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

        }
    };

    let currentLang = 'en';

    function changeLanguage(lang) {
        currentLang = lang;
        const t = translations[lang] || translations['en'];

        // 명시적 ID 매핑으로 'undefined' 방지
        const idMap = {
            'txt-disclaimer': t.disclaimer,
            'txt-title': t.title,
            'txt-label-gender': t.labelGender,
            'txt-male': t.male,
            'txt-female': t.female,
            'txt-label-currentAge': t.currentAge,
            'txt-sec-femur': t.secFemur,
            'txt-label-fStop': t.fStop,
            'txt-label-fRate': t.fRate,
            'txt-fu': t.fu,
            'txt-fl': t.fl,
            'txt-sec-tibia': t.secTibia,
            'txt-label-tStop': t.tStop,
            'txt-label-tRate': t.tRate,
            'txt-tu': t.tu,
            'txt-tl': t.tl,
            'txt-btn-reset': t.btnReset,
            'txt-btn-calc': t.btnCalc,
            'txt-auto-calc': t.autoCalc,
            'txt-res-header-text': t.resHeader,
            'txt-res-years-label': t.resYearsLabel,
            'txt-unit-years': t.unitYears,
            'txt-res-total-label': t.resTotalLabel,
            'txt-res-sub': t.resSub,
            'txt-th-point': t.thPoint,
            'txt-th-potential': t.thPotential,
            'txt-th-loss': t.thLoss,
            'txt-total-loss-label': t.totalLossLabel,
            'txt-paper-info': t.paperInfo
        };

        Object.keys(idMap).forEach(id => {
            const el = document.getElementById(id);
            if (el) el.innerHTML = idMap[id];
        });

        calculate(); // 테이블 내용 언어 업데이트
    }

    function setDefaultValues() {
        const gender = document.querySelector('input[name="gender"]:checked').value;
        if (gender === 'male') {
            document.getElementById('fStopAge').value = 14; document.getElementById('fRate').value = 1.5;
            document.getElementById('tStopAge').value = 14; document.getElementById('tRate').value = 1.67;
        } else {
            document.getElementById('fStopAge').value = 13; document.getElementById('fRate').value = 1.2;
            document.getElementById('tStopAge').value = 13; document.getElementById('tRate').value = 1.5;
        }
        calculate();
    }

    function syncRatios(type) {
        const u = document.getElementById(type + 'uRatio');
        const l = document.getElementById(type + 'lRatio');
        l.value = (100 - parseFloat(u.value || 0)).toFixed(0);
        handleInputChange();
    }

    function handleInputChange() { if (document.getElementById('autoCalcEnabled').checked) calculate(); }

    function calculate() {
        const age = parseFloat(document.getElementById('currentAge').value) || 0;
        const fs = parseFloat(document.getElementById('fStopAge').value) || 0;
        const fr = parseFloat(document.getElementById('fRate').value) || 0;
        const ts = parseFloat(document.getElementById('tStopAge').value) || 0;
        const tr = parseFloat(document.getElementById('tRate').value) || 0;
        const fy = Math.max(0, fs - age), ty = Math.max(0, ts - age);
        const fur = parseFloat(document.getElementById('fuRatio').value || 0) / 100;
        const flr = parseFloat(document.getElementById('flRatio').value || 0) / 100;
        const tur = parseFloat(document.getElementById('tuRatio').value || 0) / 100;
        const tlr = parseFloat(document.getElementById('tlRatio').value || 0) / 100;

        const losses = [fy * fr * fur, fy * fr * flr, ty * tr * tur, ty * tr * tlr];
        const total = losses.reduce((a, b) => a + b, 0);

        document.getElementById('resYearsF').innerText = fy.toFixed(1);
        document.getElementById('resYearsT').innerText = ty.toFixed(1);
        document.getElementById('resTotal').innerText = total.toFixed(2);
        document.getElementById('resTotalLoss').innerText = total.toFixed(2) + " cm";

        const t = translations[currentLang] || translations['en'];
        let html = "";
        losses.forEach((v, i) => {
            const displayRatio = (i < 2 ? [fur, flr][i % 2] : [tur, tlr][i % 2]) * 100;
            html += `<tr><td>${t.segments[i]}</td><td>${displayRatio.toFixed(0)}%</td><td class="loss">${v.toFixed(2)} cm</td></tr>`;
        });
        document.getElementById('resTable').innerHTML = html;
    }

    function resetAll() {
        document.querySelector('input[name="gender"][value="female"]').checked = true;
        document.getElementById('currentAge').value = 10;
        document.getElementById('fuRatio').value = 30;
        document.getElementById('tuRatio').value = 55;
        setDefaultValues();
    }

    window.onload = () => { 
        setDefaultValues(); 
        changeLanguage('en'); 
        document.querySelector('input[name="lang"][value="en"]').checked = true;
    };
</script>
</body>
</html>
